<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat Room</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 15px;
        }

        .chat-box {
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 10px;
        }

        .message strong {
            color: #333;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .input-area input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .input-area button {
            padding: 8px 16px;
            border: none;
            background: #2d6cdf;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        .input-area button:hover {
            background: #1f4fbf;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h3>You: <span id="current-user"></span></h3>
        <hr>
    </div>

    <div class="chat-box" id="chat-messages">
        {% for msg in messages %}
            <div class="message">
                <strong>{{ msg.sender.email }}</strong> &gt; {{ msg.content }}
            </div>
        {% empty %}
            <div>No messages yet.</div>
        {% endfor %}
    </div>

    <div class="input-area">
        <input type="text" id="chatbox" placeholder="Type message...">
        <button type="button" id="chatsubmit">Send</button>
    </div>

</div>

{{ roomname|json_script:"roomname" }}
{{ user_email|json_script:"useremail" }}

<script>
    const roomname = JSON.parse(
        document.getElementById('roomname').textContent
    );

    const currentUser = JSON.parse(
        document.getElementById('useremail').textContent
    );

    document.getElementById("current-user").innerText = currentUser;

    const chatsocket = new WebSocket(
        "ws://" + window.location.host + "/ws/chat/" + roomname + "/"
    );

    chatsocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        const container = document.getElementById('chat-messages');

        const div = document.createElement('div');
        div.className = "message";
        div.innerHTML = "<strong>" + data.sender + "</strong> &gt; " + data.message;

        container.appendChild(div);

        // Auto-scroll to bottom
        container.scrollTop = container.scrollHeight;
    };

    chatsocket.onclose = function(e){
        console.log('chat closed');
    };

    document.getElementById('chatsubmit').onclick = function(){
        const input = document.getElementById('chatbox');
        const msg = input.value.trim();

        if (!msg) return;

        chatsocket.send(JSON.stringify({
            message: msg
        }));

        input.value = '';
    };
</script>

</body>
</html>
