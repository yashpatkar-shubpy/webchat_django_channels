<!doctype html>
<html>
<head>
  <title>Home - Chat</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    button {
      padding: 6px 12px;
      border: none;
      background: #2d6cdf;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #1f4fbf;
    }

    .checkbox-row {
      margin-bottom: 6px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .small-text {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <h2>Chat Home</h2>
    <div class="small-text">
      {{ request.user.email }}
      <button onclick="logoutUser()">Logout</button>
    </div>
  </div>

  <!-- Private Users -->
  <div class="card">
    <h3>Users (1-1 Chat)</h3>
    <div id="user-list">Loading...</div>
  </div>

  <!-- Group Creation -->
  <div class="card">
    <h3>Create Group Chat</h3>
    <div id="group-user-list">Loading...</div>
    <br>
    <button onclick="createGroup()">Create Group</button>
  </div>

  <!-- Chat History -->
  <div class="card">
    <h3>Chat History</h3>
    <div id="chat-history">Loading...</div>
  </div>

</div>

<script>
  // -----------------------
  // API Fetchers
  // -----------------------

  async function fetchPrivateUsers() {
    const res = await fetch("/chat/private-users/", {
      credentials: "include"
    });
    if (!res.ok) throw new Error("Private users fetch failed");
    return res.json();
  }

  async function fetchGroupUsers() {
    const res = await fetch("/chat/group-users/", {
      credentials: "include"
    });
    if (!res.ok) throw new Error("Group users fetch failed");
    return res.json();
  }

  async function fetchChatHistory() {
    const res = await fetch("/chat/history-chats/", {
      credentials: "include"
    });
    if (!res.ok) throw new Error("Chat history fetch failed");
    return res.json();
  }

  async function loadHomeData() {
    try {
      const [privateUsers, groupUsers, history] = await Promise.all([
        fetchPrivateUsers(),
        fetchGroupUsers(),
        fetchChatHistory()
      ]);

      renderPrivateUsers(privateUsers);
      renderGroupUsers(groupUsers);
      renderHistory(history);

    } catch (err) {
      console.error(err);
    }
  }

  // Render Private Users

  function renderPrivateUsers(users) {
    const container = document.getElementById("user-list");
    container.innerHTML = "";

    users.forEach(user => {
      const row = document.createElement("div");
      row.className = "row";

      const span = document.createElement("span");
      span.textContent = user.email;

      const button = document.createElement("button");
      button.textContent = "Chat";
      button.onclick = () => startPrivateChat(user.id);

      row.appendChild(span);
      row.appendChild(button);
      container.appendChild(row);
    });
  }

  // Render Group Users

  function renderGroupUsers(users) {
    const container = document.getElementById("group-user-list");
    container.innerHTML = "";

    users.forEach(user => {
      const div = document.createElement("div");
      div.className = "checkbox-row";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.value = user.id;
      checkbox.className = "group-user-checkbox";

      const label = document.createElement("span");
      label.textContent = " " + user.email;

      div.appendChild(checkbox);
      div.appendChild(label);
      container.appendChild(div);
    });
  }

  // Render Chat History
  function renderHistory(history) {
    const container = document.getElementById("chat-history");
    container.innerHTML = "";

    history.forEach(conv => {
      const row = document.createElement("div");
      row.className = "row";

      const span = document.createElement("span");
      span.textContent = `${conv.type} (${conv.created_at})`;

      const button = document.createElement("button");
      button.textContent = "Open";
      button.onclick = () => {
        window.location.href = `/chat/${conv.id}/`;
      };

      row.appendChild(span);
      row.appendChild(button);
      container.appendChild(row);
    });
  }

  // -----------------------
  // CSRF Helper
  // -----------------------

  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== "") {
      const cookies = document.cookie.split(";");
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.startsWith(name + "=")) {
          cookieValue = decodeURIComponent(
            cookie.substring(name.length + 1)
          );
          break;
        }
      }
    }
    return cookieValue;
  }

  // -----------------------
  // Start Private Chat
  // -----------------------

  async function startPrivateChat(userId) {
    try {
      const response = await fetch("/chat/private/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": getCookie("csrftoken"),
        },
        credentials: "include",
        body: JSON.stringify({ member_id: userId })
      });

      if (!response.ok) throw new Error("Private chat failed");

      const data = await response.json();

      if (data.conversation_id) {
        window.location.href = `/chat/${data.conversation_id}/`;
      }

    } catch (err) {
      console.error(err);
      alert("Unable to start private chat.");
    }
  }

  // -----------------------
  // Create Group Chat
  // -----------------------

  async function createGroup() {
    const checkboxes = document.querySelectorAll(
      ".group-user-checkbox:checked"
    );

    const selectedIds = Array.from(checkboxes)
      .map(cb => parseInt(cb.value));

    if (selectedIds.length < 2) {
      alert("Select at least 2 users");
      return;
    }

    try {
      const response = await fetch("/chat/group/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": getCookie("csrftoken"),
        },
        credentials: "include",
        body: JSON.stringify({
          group_name: "New Group",
          member_ids: selectedIds
        })
      });

      if (!response.ok) throw new Error("Group creation failed");

      const data = await response.json();

      if (data.conversation_id) {
        window.location.href = `/chat/${data.conversation_id}/`;
      }

    } catch (err) {
      console.error(err);
      alert("Unable to create group chat.");
    }
  }

  // -----------------------
  // Logout
  // -----------------------

  async function logoutUser() {
    try {
      await fetch("/accounts/api/logout/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": getCookie("csrftoken"),
        },
        credentials: "include"
      });

      window.location.href = "/accounts/login/";

    } catch (err) {
      console.error("Logout failed:", err);
    }
  }

  // Initialize
  loadHomeData();
</script>

</body>
</html>
